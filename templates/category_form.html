{% extends "base.html" %}
{% block title %}{{ t('meta.page_category_edit') }}{% endblock %}
{% block body %}
<div class="mx-auto max-w-lg">
  <div class="mb-8">
    <h1 class="text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl">{{ t('cat_edit.title') }}</h1>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-md shadow-slate-200/50 sm:p-8">
    <form method="post" class="space-y-5">
      <div>
        <label for="name" class="mb-1.5 block text-sm font-semibold text-slate-700">{{ t('cat_edit.name') }} <span class="text-red-500">{{ t('common.required_star') }}</span></label>
        <input type="text" id="name" name="name" required value="{{ category.name }}"
          class="block w-full rounded-xl border border-slate-300 px-4 py-2.5 text-slate-900 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
      </div>
      <div class="flex flex-wrap gap-3 border-t border-slate-100 pt-6">
        <button type="submit" class="inline-flex items-center justify-center rounded-xl bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-md transition hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
          {{ t('wform.save') }}
        </button>
        <a href="{{ url_for('categories') }}" class="inline-flex items-center justify-center rounded-xl border border-slate-300 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 shadow-sm transition hover:bg-slate-50">
          {{ t('wform.cancel') }}
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
