{% macro select_field(id, name, class_extra='') %}
<div class="relative">
  <select id="{{ id }}" name="{{ name }}"
    class="block w-full cursor-pointer appearance-none rounded-lg border border-slate-300 bg-white py-2 pl-3 pr-9 text-base text-slate-900 shadow-sm transition focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 md:py-1.5 md:text-sm {{ class_extra }}">
    {{ caller() }}
  </select>
  <span class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-2.5 text-slate-500">
    <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
  </span>
</div>
{% endmacro %}
